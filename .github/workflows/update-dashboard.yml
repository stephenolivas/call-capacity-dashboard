name: Update Call Capacity Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [update_dashboard.py]

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard update
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          OUTPUT_FILE: index.html
          PYTHONUNBUFFERED: "1"
        run: python -u update_dashboard.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "📊 Update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
